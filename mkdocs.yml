site_name: Component Integrity & Lifecycle Management (CILM)
site_url: https://cilm-standard.com/

theme:
  name: material
  logo: assets/images/cilm-mark-white.png
  favicon: assets/images/favicon.png
  palette:
    primary: slate
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate

extra_css:
  - stylesheets/extra.css

copyright: >
  CILM is an independent methodology and is not affiliated with or endorsed by SAE, IEEE, NIST, or any U.S. government agency.

markdown_extensions:
  - meta
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Context:
      - Industry Problem: industry-context.md
  - Framework: framework.md
  - Standards Alignment: standards-alignment.md
  - Risk Intelligence: risk-intelligence.md
  - U.S. Application: us-application.md
  - Data & Publications: data-and-publications.md
  - About: about.md
