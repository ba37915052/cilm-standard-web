    <path d="M504 307 L504 263 L476 235 L476 199" stroke="#0B2A4A" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="476" cy="191" r="16" fill="#0B2A4A"/>
