    <path d="M341.5 488 L345 485 L345 479" stroke="#0B2A4A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="345" cy="478" r="2.2" fill="#0B2A4A"/>
    <path d="M339 494 L339 489 L335 485 L335 480" stroke="#0B2A4A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
