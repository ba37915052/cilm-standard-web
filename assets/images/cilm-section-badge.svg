    <path d="M210 282 L234 258 L234 208" stroke="#0B2A4A" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="234" cy="200" r="16" fill="#0B2A4A"/>
